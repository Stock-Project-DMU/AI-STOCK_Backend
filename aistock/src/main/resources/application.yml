spring:
  application:
    name: aistock
  profiles:
    active: dev

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:local-development-secret-key-change-me-please-0123456789}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

# CORS 허용 프론트 도메인 - 콤마(,)로 여러 개 지정 가능 (예: http://localhost:3000,https://aistock.example.com)
# 로컬 개발 편의를 위해 기본값은 프론트 로컬 서버(localhost:3000)로 두고,
# 운영 환경 값은 application-prod.yml에서 기본값 없이 환경변수로 강제한다 (하드코딩 금지 원칙).
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
